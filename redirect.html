<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting ...</title>
    
    <meta http-equiv="refresh" content="0; url=https://wolfvox.github.io/">

    <script>
        /**
         * window.location.replace is better than .href because 
         * it doesn't keep the redirect page in the browser history.
         */
        window.location.replace("https://wolfvox.github.io/");
    </script>
</head>
<body>
    <p>Redirecting you to the homepage... 
       <a href="https://wolfvox.github.io/">Click here</a> if nothing happens.
    </p>
</body>
</html>
