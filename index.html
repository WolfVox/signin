<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | WolfVox™</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg: #000000;
            --header: #000000;
            --card-bg: #000000;
            --border: #2d2d30;
            --accent: #7a6cff;
            --text-main: #eeeeee;
            --text-dim: #a1a1aa;
            --error: #ff4d4d;
            --purple-glow: #a855f7;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg); 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--text-main); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 30px; background: var(--header); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .login-card h2 { margin-bottom: 10px; font-size: 24px; }
        .login-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 6px; 
        }

        input:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { color: var(--accent); }

        .render-btn {
            position: relative; padding: 10px 25px; font-size: 11px; font-weight: 700; color: var(--accent);
            background: transparent; border: 1px solid var(--accent); cursor: pointer; overflow: hidden;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; text-decoration: none;
            display: inline-block; z-index: 1; border-radius: 2000px;
        }

        .render-btn:hover { color:#000000; border-color:#ffffff; background: #fff; }

        /* Menu Toggle Styling */
        .menu-toggle {
            display: flex; flex-direction: column; justify-content: space-between;
            width: 25px; height: 18px; background: transparent; border: none;
            cursor: pointer; padding: 0; margin-right: 20px; z-index: 1100;
        }

        .menu-toggle span {
            width: 100%; height: 2px; background-color: #fff;
            border-radius: 10px; transition: all 0.3s ease; transform-origin: left;
        }

        /* Side Menu */
        .side-menu {
            position: fixed; top: 0; left: -300px; /* Changed to left to match toggle position */
            width: 280px; height: 100vh; background: #050505;
            border-right: 1px solid var(--border); padding: 80px 40px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50;
            display: flex; flex-direction: column; gap: 20px;
        }

        .side-menu.active { left: 0; }

        .sub-btn { 
            background: none; border: none; color: var(--text-dim); font-size: 14px; 
            cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 12px;
        }
        .sub-btn:hover, .sub-btn.active { color: #fff; }

        .span-text {
            background: linear-gradient(to right, #4e2fff 1%, #7bfed4 74%);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; font-weight: bold;
        }

        footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--border); background: #000; }
    </style>
</head>
<body>

<nav>
    <div style="display: flex; align-items: center;">
        <button class="menu-toggle" id="menuBtn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <img src="https://github.com/WolfVox/Logos/blob/main/wolfvoxtm.png?raw=true" alt="WolfVox" height="40">
    </div>

    <div id="navAuthArea" style="display: flex; gap: 15px; align-items: center;">
        <div style="display: none; align-items: center; gap: 8px; border: 1px solid var(--border); padding: 5px 12px; border-radius: 2000px; background: rgba(255,255,255,0.02);" id="desktopSupport">
            <h5 style="margin: 0; font-size: 10px;">[ <i class="span-text" style="font-style: normal;">support : wolfvoxco@gmail.com</i> ]</h5>
        </div>
        <a href="https://login.wolfvox.me" class="render-btn"><i class="fa-solid fa-right-to-bracket"></i> Sign In</a>
    </div>
</nav>

<div id="mobileMenu" class="side-menu">
    <img src="https://github.com/WolfVox/Logos/blob/main/wolfvoxtm.png?raw=true" alt="WolfVox" width="140" style="margin-bottom: 20px;">
    <a href="https://wolfvox.me" class="sub-btn"><i class="fa-solid fa-house"></i> Home</a>
    <a href="https://forms.wolfvox.me" class="sub-btn"><i class="fa-solid fa-code"></i> Forms</a>
    <a href="https://hosting.wolfvox.me" class="sub-btn"><i class="fa-solid fa-tower-broadcast"></i> Hosting</a>
    <a href="https://login.wolfvox.me" class="sub-btn active"><i class="fa-solid fa-right-to-bracket"></i> Accounts</a>
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 10px 0;">
    <p style="font-size: 11px; color: var(--text-dim);">Contact: wolfvoxco@gmail.com</p>
</div>

<div class="login-container">
    <div class="login-card">
        <img src="https://github.com/WolfVox/wolfvox.github.io/blob/main/WolfVoxLogo.png?raw=true" height="50" style="margin-bottom: 20px;">
        <h2>Welcome Back</h2>
        <p>Sign in to your WolfVox account to continue.</p>

        <div id="g_id_onload"
             data-client_id="116311894928-qararv9qqqhtjomb2nbljfbrgrho9uft.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="continue_with" data-size="large" data-logo_alignment="left" style="display: flex; justify-content: center;"></div>

        <div style="margin:25px 0; font-size:11px; color:var(--text-dim); letter-spacing: 1px; font-weight: bold;">OR STAFF LOGIN</div>
        
        <input type="email" placeholder="Email Address" disabled title="Staff login coming soon">
        <input type="password" placeholder="Password" disabled title="Staff login coming soon">
        
        <a href="https://wolfvox.me" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>
</div>

<footer>
    &copy; 2026 WolfVox™ Industries. All rights reserved.
</footer>

<script>
    // Toggle Sidebar Menu
    function toggleMenu() {
        const menu = document.getElementById('mobileMenu');
        const spans = document.querySelectorAll('.menu-toggle span');
        
        menu.classList.toggle('active');
        
        if (menu.classList.contains('active')) {
            spans[0].style.transform = "rotate(45deg)";
            spans[1].style.opacity = "0";
            spans[2].style.transform = "rotate(-45deg)";
        } else {
            spans[0].style.transform = "rotate(0)";
            spans[1].style.opacity = "1";
            spans[2].style.transform = "rotate(0)";
        }
    }

    // Google Login Callback
    function handleGoogleLogin(response) {
        try {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const userData = {
                name: payload.name,
                email: payload.email,
                img: payload.picture
            };
            localStorage.setItem('wv_user', JSON.stringify(userData));
            window.location.href = 'https://wolfvox.me'; 
        } catch (e) {
            console.error("Login failed", e);
        }
    }

    // Auth Check
    window.onload = () => {
        if(localStorage.getItem('wv_user')) {
            window.location.href = 'https://wolfvox.me';
        }
    }
</script>

</body>
</html>
